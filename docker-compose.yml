services:
  mongo:
    image: mongo:7
    container_name: zonegym-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - red-interna

  app-logic:
    build: .
    container_name: zonegym-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/zonegym
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "5000"
    networks:
      - red-interna

  web-server:
    image: nginx:alpine
    container_name: zonegym-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app-logic
    networks:
      - red-interna

volumes:
  mongo-data:

networks:
  red-interna:
    driver: bridge